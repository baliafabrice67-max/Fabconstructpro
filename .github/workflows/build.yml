
name: Generation APK Fabconstruct

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Recuperation du code source
      uses: actions/checkout@v4

    - name: Configuration de Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configuration de Gradle et Build
      uses: gradle/actions/setup-gradle@v3
      with:
        arguments: assembleDebug

    - name: Sauvegarder et rendre l'APK telechargeable
      uses: actions/upload-artifact@v4
      with:
        name: FabconstructPro-Developpement-APK
        path: app/build/outputs/apk/debug/app-debug.apk
