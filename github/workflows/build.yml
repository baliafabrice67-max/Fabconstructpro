name: Generation APK Fabconstruct

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperation du code source
        uses: actions/checkout@v4

      - name: Configuration de Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Construire l'APK avec Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Sauvegarder l'APK
        uses: actions/upload-artifact@v4
        with:
          name: FabconstructPro-APK
          path: app/build/outputs/apk/debug/app-debug.apk
