name: Generation APK Fabconstruct
    branches: [ "main" ]
  workflow_dispatch:
    runs-on: ubuntu-lates
      - name: Recuperation du code source
        uses: actions/checkout@v4
      - name: Configuration de Java (JDK 17)
        uses: actions/setup-java@v4
          distribution: 'zulu'
          java-version: '17'
      - name: Construire l'APK avec Gradle
        run: ./gradlew assembleDebug
      - name: Sauvegarder l'APK
        uses: actions/upload-artifact@v
          name: FabconstructPro-APK
          path: app/build/outputs/apk/debug/app-debug.apk
